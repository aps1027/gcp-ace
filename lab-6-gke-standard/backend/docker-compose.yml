version: '3.9'

services:
  mysql:
    image: mysql:8.0-debian
    ports:
      - '3306:3306'
    volumes:
      - ./db/data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    ports:
      - '50051:50051'
    environment:
      NODE_ENV: ${NODE_ENV}
      AUTH_MS_URL: ${AUTH_MS_URL}
      STAFF_JWT_SECRET: ${STAFF_JWT_SECRET}
      AUTH_MS_DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "
      npx prisma migrate deploy --schema=databases/auth/schema.prisma &&
      node dist/apps/auth/main
      "
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      AUTH_MS_URL: auth:50051
      STAFF_FRONTEND_URL: ${STAFF_FRONTEND_URL}
    depends_on:
      mysql:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped
