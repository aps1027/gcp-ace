steps:
  # Build API Gateway image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/backend/api-gateway:$COMMIT_SHA
      - ./backend/apps/api

  # Push API Gateway image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/backend/api-gateway:$COMMIT_SHA

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/backend/api-gateway:$COMMIT_SHA

timeout: 1200s # 20 minutes

options:
  logging: CLOUD_LOGGING_ONLY
