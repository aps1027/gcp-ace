steps:
  # Build Auth MS image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/backend/auth-ms:$COMMIT_SHA
      - ./backend/apps/auth

  # Push Auth MS image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/backend/auth-ms:$COMMIT_SHA

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/backend/auth-ms:$COMMIT_SHA

timeout: 1200s  # 20 minutes

options:
  logging: CLOUD_LOGGING_ONLY