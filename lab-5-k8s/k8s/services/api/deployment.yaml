apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: k8s-dev
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: backend-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

          env:
            # =========================
            # ENVIRONMENT
            # =========================
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: config
                  key: NODE_ENV

            # =========================
            # AUTH SERVICE CONNECTION
            # =========================
            - name: AUTH_MS_URL
              value: "auth:50051"

            - name: API_PORT
              value: "3000"

            # Optional: frontend URL or CORS
            - name: STAFF_FRONTEND_URL
              value: "http://localhost:5174"

            
            # =========================
            # SECURITY
            # =========================
            - name: STAFF_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: STAFF_JWT_SECRET
